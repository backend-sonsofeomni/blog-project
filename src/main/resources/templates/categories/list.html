<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 목록</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800">

<div class="max-w-6xl mx-auto p-6">

    <header class="flex justify-between items-center mb-6">
        <a href="/posts" class="text-3xl font-black">엄니네 Blog</a>

        <div class="flex gap-3 items-center">
            <a th:if="${loginUsername != null}"
               th:href="@{/users/{username}(username=${loginUsername})}"
               class="font-bold text-slate-700">
                내 프로필
            </a>

            <a th:if="${loginUsername == null}" href="/login"
               class="bg-slate-700 text-white px-4 py-2 rounded-xl">
                로그인
            </a>

            <a th:if="${loginUsername == null}" href="/signup"
               class="bg-blue-600 text-white px-4 py-2 rounded-xl">
                회원가입
            </a>

            <a th:if="${loginUsername != null}"
               href="/dm"
               class="bg-slate-800 text-white px-4 py-2 rounded-xl">
                메시지함
            </a>

            <form th:if="${loginUsername != null}" action="/logout" method="post">
                <button class="bg-slate-700 text-white px-4 py-2 rounded-xl">
                    로그아웃
                </button>
            </form>
        </div>
    </header>

    <aside class="w-64 bg-white rounded-3xl shadow p-6">
        <h2 class="text-xl font-bold mb-5">카테고리</h2>

        <div class="space-y-2 text-sm">

            <a href="/posts"
               class="flex justify-between items-center py-1 font-semibold hover:text-blue-600">
                <span>전체보기</span>
            </a>

            <a href="/posts?filter=none"
               class="block py-1 text-slate-600 hover:text-blue-600">
                카테고리 없음
            </a>

            <div th:each="category : ${rootCategories}" class="mt-3">

                <a th:href="@{/posts(categoryId=${category.id})}"
                   class="flex items-center gap-1 py-1 font-bold hover:text-blue-600">
                    <span>▾</span>
                    <span th:text="${category.name}">부모 카테고리</span>
                </a>

                <div class="ml-5 border-l border-dotted border-slate-300 pl-3 space-y-1">
                    <a th:each="child : ${category.children}"
                       th:href="@{/posts(categoryId=${child.id})}"
                       class="block py-1 text-slate-600 hover:text-blue-600">
                        <span class="text-slate-400">└</span>
                        <span th:text="${child.name}">자식 카테고리</span>
                    </a>
                </div>
            </div>

        </div>

        <a href="/categories"
           class="block mt-8 bg-slate-800 text-white text-center py-3 rounded-xl font-bold">
            카테고리 관리
        </a>
    </aside>

    <main class="flex-1 bg-white rounded-3xl shadow p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">게시글 목록</h1>

            <a href="/posts/new"
               class="bg-blue-600 text-white px-5 py-3 rounded-xl font-bold">
                글쓰기
            </a>
        </div>

        <div class="space-y-4">
            <article th:each="post : ${posts}"
                     class="border rounded-2xl p-5 hover:bg-slate-50">

                <div class="flex justify-between items-start">
                    <div>
                        <a th:href="@{/posts/{id}(id=${post.id})}"
                           th:text="${post.title}"
                           class="text-xl font-bold hover:underline">
                            제목
                        </a>

                        <p class="text-sm text-slate-500 mt-2">
                            by
                            <a th:href="@{/users/{username}(username=${post.author.username})}"
                               th:text="${post.author.displayName}"
                               class="font-bold">
                                작성자
                            </a>

                            ·

                            <span th:text="${post.category != null ? post.category.name : '카테고리 없음'}">
                                    카테고리
                                </span>

                            · 조회수
                            <span th:text="${post.viewCount}">0</span>
                        </p>
                    </div>

                    <span th:text="${post.public ? '공개' : '비공개'}"
                          class="text-sm bg-slate-100 px-3 py-1 rounded-full">
                            공개
                        </span>
                </div>
            </article>
        </div>
    </main>
</div>
</div>

</body>
</html>
