<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${post.title}">게시글 상세</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 text-slate-800">

<div class="max-w-5xl mx-auto p-6">

    <!-- Post Detail -->
    <div class="bg-white rounded-3xl shadow p-8 mb-6">

        <div class="flex justify-between items-start mb-8">
            <div>
                <h1 th:text="${post.title}"
                    class="text-4xl font-black mb-4">
                    게시글 제목
                </h1>

                <p class="text-slate-500">
                    카테고리
                    <span th:text="${post.categoryTitle != null ? post.categoryTitle : '카테고리 없음'}">
                        카테고리 없음
                    </span>

                    · 조회수
                    <span th:text="${post.viewedCnt}">0</span>

                    · 공개 여부
                    <span th:text="${post.visibility}">PUBLIC</span>
                </p>
            </div>

            <a href="/posts"
               class="bg-slate-700 text-white px-5 py-3 rounded-2xl font-bold">
                목록
            </a>
        </div>

        <div th:text="${post.content}"
             class="whitespace-pre-line text-lg leading-9 min-h-[300px] border-t border-b py-8 mb-8">
            게시글 내용
        </div>

        <div class="flex gap-3">
            <a th:href="@{/posts/{postId}/edit(postId=${post.postId})}"
               class="bg-blue-600 text-white px-5 py-3 rounded-2xl font-bold">
                수정
            </a>

            <form th:action="@{/posts/{postId}/delete(postId=${post.postId})}" method="post">
                <button type="submit"
                        class="bg-red-600 text-white px-5 py-3 rounded-2xl font-bold">
                    삭제
                </button>
            </form>

            <a href="/posts"
               class="bg-slate-200 text-slate-700 px-5 py-3 rounded-2xl font-bold">
                목록으로
            </a>
        </div>

    </div>

    <!-- Comment Section -->
    <div class="bg-white rounded-3xl shadow p-8">

        <h2 class="text-2xl font-black mb-6">댓글</h2>

        <!-- Create Comment -->
        <form th:action="@{/posts/{postId}/comments(postId=${post.postId})}"
              method="post"
              class="flex gap-3 mb-8">

            <input type="text"
                   name="content"
                   class="flex-1 border border-slate-300 rounded-2xl px-5 py-4"
                   placeholder="댓글을 입력하세요"
                   required>

            <button type="submit"
                    class="bg-blue-600 text-white px-6 py-4 rounded-2xl font-bold">
                작성
            </button>
        </form>

        <!-- Comment List -->
        <div class="space-y-4">

            <div th:each="comment : ${comments}"
                 class="border border-slate-200 rounded-2xl p-5">

                <div class="flex justify-between items-start gap-4">

                    <div class="flex-1">
                        <p th:text="${comment.content}"
                           class="text-lg leading-7">
                            댓글 내용
                        </p>

                        <p class="text-sm text-slate-400 mt-2">
                            댓글 ID:
                            <span th:text="${comment.id}">1</span>
                        </p>
                    </div>

                    <form th:action="@{/posts/{postId}/comments/{commentId}/delete(postId=${post.postId}, commentId=${comment.id})}"
                          method="post">
                        <button type="submit"
                                class="text-red-600 font-bold">
                            삭제
                        </button>
                    </form>

                </div>
            </div>

            <div th:if="${comments == null or #lists.isEmpty(comments)}"
                 class="text-center text-slate-400 py-10">
                아직 댓글이 없습니다.
            </div>

        </div>

    </div>

</div>

</body>
</html>
