<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 목록</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 text-slate-800">

<div class="max-w-7xl mx-auto p-6">

    <!-- Header -->
    <header class="flex justify-between items-center mb-8">
        <a th:href="@{/posts(page=1)}" class="text-3xl font-black tracking-tight">
            엄니네 블로그
        </a>

        <a href="/posts/new"
           class="bg-blue-600 text-white px-5 py-3 rounded-2xl font-bold shadow hover:bg-blue-700">
            글쓰기
        </a>
    </header>

    <!-- Main Layout -->
    <div class="flex gap-6 items-start">

        <!-- Category Sidebar -->
        <aside class="w-72 bg-white rounded-3xl shadow p-7 shrink-0">
            <h2 class="text-2xl font-black mb-6">카테고리</h2>

            <div class="space-y-4 text-lg">
                <a th:href="@{/posts(page=1)}"
                   th:classappend="${selectedCategoryId == null and !noCategory} ? ' text-blue-600' : ''"
                   class="block font-bold hover:text-blue-600">
                    전체보기
                </a>

                <a th:href="@{/posts(page=1, noCategory=true)}"
                   th:classappend="${noCategory} ? ' text-blue-600 font-bold' : ''"
                   class="block text-slate-500 hover:text-blue-600">
                    카테고리 없음
                </a>

                <div class="border-t pt-4 space-y-3">
                    <a th:each="category : ${categories}"
                       th:href="@{/posts(page=1, categoryId=${category.id})}"
                       th:classappend="${selectedCategoryId != null and selectedCategoryId == category.id} ? ' text-blue-600' : ''"
                       class="block font-semibold hover:text-blue-600">
                        <span class="text-slate-400">▾</span>
                        <span th:text="${category.title}">카테고리명</span>
                    </a>
                </div>
            </div>

            <a href="/categories"
               class="block mt-10 bg-slate-800 text-white text-center py-4 rounded-2xl font-bold hover:bg-slate-900">
                카테고리 관리
            </a>
        </aside>

        <!-- Post List -->
        <main class="flex-1 bg-white rounded-3xl shadow p-7">

            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-black">게시글 목록</h1>
            </div>

            <div class="space-y-5">

                <article th:each="post : ${posts}"
                         class="border border-slate-200 rounded-3xl p-6 hover:bg-slate-50 transition">

                    <div class="flex justify-between items-start gap-4">

                        <div>
                            <a th:href="@{/posts/{postId}(postId=${post.postId})}"
                               th:text="${post.title}"
                               class="text-2xl font-black hover:underline">
                                게시글 제목
                            </a>

                            <p class="text-slate-500 mt-3">
<!--                                카테고리-->
                                <span th:text="${post.categoryTitle}">카테고리 없음</span>

                                · 조회수
                                <span th:text="${post.viewedCnt}">0</span>

                                · 작성일
                                <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</span>
                            </p>
                        </div>

                        <span th:text="${post.visibility}"
                              class="text-sm bg-slate-100 px-4 py-2 rounded-full font-bold">
                            PUBLIC
                        </span>
                    </div>
                </article>

                <div th:if="${posts == null or #lists.isEmpty(posts)}"
                     class="text-center text-slate-400 py-20">
                    아직 작성된 게시글이 없습니다.
                </div>

            </div>

            <!-- Pagination -->
            <div th:if="${page != null and page.totalPages > 0}"
                 class="flex items-center justify-between border-t border-slate-200 px-4 py-5 sm:px-6 mt-8">

                <!-- Mobile pagination -->
                <div class="flex flex-1 justify-between sm:hidden">

                    <a th:if="${page.hasPrevious}"
                       th:href="@{/posts(page=${page.currentPage - 1}, categoryId=${selectedCategoryId}, noCategory=${noCategory})}"
                       class="relative inline-flex items-center rounded-md border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">
                        Previous
                    </a>

                    <span th:if="${!page.hasPrevious}"
                          class="relative inline-flex items-center rounded-md border border-slate-200 bg-slate-100 px-4 py-2 text-sm font-medium text-slate-400">
                        Previous
                    </span>

                    <a th:if="${page.hasNext}"
                       th:href="@{/posts(page=${page.currentPage + 1}, categoryId=${selectedCategoryId}, noCategory=${noCategory})}"
                       class="relative ml-3 inline-flex items-center rounded-md border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">
                        Next
                    </a>

                    <span th:if="${!page.hasNext}"
                          class="relative ml-3 inline-flex items-center rounded-md border border-slate-200 bg-slate-100 px-4 py-2 text-sm font-medium text-slate-400">
                        Next
                    </span>

                </div>

                <!-- Desktop pagination -->
                <div class="hidden sm:flex sm:flex-1 sm:items-center sm:justify-between">

                    <div>
                        <p class="text-sm text-slate-500">
                            Page
                            <span class="font-medium" th:text="${page.currentPage}">1</span>
                            of
                            <span class="font-medium" th:text="${page.totalPages}">1</span>
                        </p>
                    </div>

                    <div>
                        <nav aria-label="Pagination" class="isolate inline-flex -space-x-px rounded-md shadow-sm">

                            <!-- Previous -->
                            <a th:if="${page.hasPrevious}"
                               th:href="@{/posts(page=${page.currentPage - 1}, categoryId=${selectedCategoryId}, noCategory=${noCategory})}"
                               class="relative inline-flex items-center rounded-l-md px-2 py-2 text-slate-400 ring-1 ring-inset ring-slate-300 hover:bg-slate-50 focus:z-20 focus:outline-offset-0">
                                <span class="sr-only">Previous</span>
                                <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" class="size-5">
                                    <path d="M11.78 5.22a.75.75 0 0 1 0 1.06L8.06 10l3.72 3.72a.75.75 0 1 1-1.06 1.06l-4.25-4.25a.75.75 0 0 1 0-1.06l4.25-4.25a.75.75 0 0 1 1.06 0Z"
                                          clip-rule="evenodd"
                                          fill-rule="evenodd"/>
                                </svg>
                            </a>

                            <span th:if="${!page.hasPrevious}"
                                  class="relative inline-flex items-center rounded-l-md px-2 py-2 text-slate-300 ring-1 ring-inset ring-slate-200 cursor-not-allowed">
                                <span class="sr-only">Previous</span>
                                <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" class="size-5">
                                    <path d="M11.78 5.22a.75.75 0 0 1 0 1.06L8.06 10l3.72 3.72a.75.75 0 1 1-1.06 1.06l-4.25-4.25a.75.75 0 0 1 0-1.06l4.25-4.25a.75.75 0 0 1 1.06 0Z"
                                          clip-rule="evenodd"
                                          fill-rule="evenodd"/>
                                </svg>
                            </span>

                            <!-- Page numbers -->
                            <a th:each="pageNumber : ${#numbers.sequence(1, page.totalPages)}"
                               th:href="@{/posts(page=${pageNumber}, categoryId=${selectedCategoryId}, noCategory=${noCategory})}"
                               th:text="${pageNumber}"
                               th:aria-current="${pageNumber == page.currentPage ? 'page' : null}"
                               th:classappend="${pageNumber == page.currentPage}
                                    ? ' z-10 bg-blue-600 text-white focus-visible:outline-blue-600'
                                    : ' text-slate-700 ring-1 ring-inset ring-slate-300 hover:bg-slate-50'"
                               class="relative inline-flex items-center px-4 py-2 text-sm font-semibold focus:z-20 focus:outline-offset-0">
                                1
                            </a>

                            <!-- Next -->
                            <a th:if="${page.hasNext}"
                               th:href="@{/posts(page=${page.currentPage + 1}, categoryId=${selectedCategoryId}, noCategory=${noCategory})}"
                               class="relative inline-flex items-center rounded-r-md px-2 py-2 text-slate-400 ring-1 ring-inset ring-slate-300 hover:bg-slate-50 focus:z-20 focus:outline-offset-0">
                                <span class="sr-only">Next</span>
                                <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" class="size-5">
                                    <path d="M8.22 5.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L11.94 10 8.22 6.28a.75.75 0 0 1 0-1.06Z"
                                          clip-rule="evenodd"
                                          fill-rule="evenodd"/>
                                </svg>
                            </a>

                            <span th:if="${!page.hasNext}"
                                  class="relative inline-flex items-center rounded-r-md px-2 py-2 text-slate-300 ring-1 ring-inset ring-slate-200 cursor-not-allowed">
                                <span class="sr-only">Next</span>
                                <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" class="size-5">
                                    <path d="M8.22 5.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L11.94 10 8.22 6.28a.75.75 0 0 1 0-1.06Z"
                                          clip-rule="evenodd"
                                          fill-rule="evenodd"/>
                                </svg>
                            </span>

                        </nav>
                    </div>
                </div>
            </div>

        </main>

    </div>
</div>

</body>
</html>
