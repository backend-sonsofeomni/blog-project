<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 목록</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 text-slate-800">

<div class="max-w-7xl mx-auto p-6">

    <!-- Header -->
    <header class="flex justify-between items-center mb-8">
        <a href="/posts" class="text-3xl font-black tracking-tight">
            Social Blog
        </a>

        <a href="/posts/new"
           class="bg-blue-600 text-white px-5 py-3 rounded-2xl font-bold shadow hover:bg-blue-700">
            글쓰기
        </a>
    </header>

    <!-- Layout -->
    <div class="flex gap-6 items-start">

        <!-- Left Category Sidebar -->
        <aside class="w-72 bg-white rounded-3xl shadow p-7 shrink-0">
            <h2 class="text-2xl font-black mb-6">카테고리</h2>

            <div class="space-y-4 text-lg">
                <a href="/posts"
                   class="block font-bold hover:text-blue-600">
                    전체보기
                </a>

                <a href="/posts?filter=none"
                   class="block text-slate-500 hover:text-blue-600">
                    카테고리 없음
                </a>

                <div class="border-t pt-4 space-y-3">
                    <a th:each="category : ${categories}"
                       th:href="@{/posts(categoryId=${category.id})}"
                       class="block font-semibold hover:text-blue-600">
                        <span class="text-slate-400">▾</span>
                        <span th:text="${category.title}">카테고리명</span>
                    </a>
                </div>
            </div>

            <a href="/categories"
               class="block mt-10 bg-slate-800 text-white text-center py-4 rounded-2xl font-bold hover:bg-slate-900">
                카테고리 관리
            </a>
        </aside>

        <!-- Right Post List -->
        <main class="flex-1 bg-white rounded-3xl shadow p-7">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-black">게시글 목록</h1>
            </div>

            <div class="space-y-5">

                <article th:each="post : ${posts}"
                         class="border border-slate-200 rounded-3xl p-6 hover:bg-slate-50 transition">

                    <div class="flex justify-between items-start gap-4">

                        <div>
                            <a th:href="@{/posts/{postId}(postId=${post.postId})}"
                               th:text="${post.title}"
                               class="text-2xl font-black hover:underline">
                                게시글 제목
                            </a>

                            <p class="text-slate-500 mt-3">
                                카테고리
                                <span th:text="${post.categoryTitle != null ? post.categoryTitle : '카테고리 없음'}">
                                    카테고리 없음
                                </span>

                                · 조회수
                                <span th:text="${post.viewedCnt}">0</span>
                            </p>
                        </div>

                        <span th:text="${post.visibility}"
                              class="text-sm bg-slate-100 px-4 py-2 rounded-full font-bold">
                            PUBLIC
                        </span>
                    </div>
                </article>

                <div th:if="${#lists.isEmpty(posts)}"
                     class="text-center text-slate-400 py-20">
                    아직 작성된 게시글이 없습니다.
                </div>

            </div>
        </main>

    </div>
</div>

<div>
    <a th:if="${page.hasPrevious}"
       th:href="@{/posts(page=${page.currentPage - 1})}">
        이전
    </a>

    <span th:text="${page.currentPage}">1</span>
    /
    <span th:text="${page.totalPages}">1</span>

    <a th:if="${page.hasNext}"
       th:href="@{/posts(page=${page.currentPage + 1})}">
        다음
    </a>
</div>

</body>
</html>
